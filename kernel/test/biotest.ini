; I/O addressing regression test -- task 18a (kernel/dev/bio.c, kernel/utab.c).
;
; biotest (source biotest.c + crt0.s) links the kernel's REAL bio.o -- swap() and physio()
; both live there -- plus utab.o and brz.o, and hands them a hand-built process.  Everything
; else bio.o names is stubbed in biotest.c, including a recording strategy routine that logs
; what each transfer was handed and completes it synchronously.
;
; What it proves.  A device transfer names a PHYSICAL WORD address and the machine has 512
; Kwords, but a caddr_t is a fat pointer whose word field is 15 bits and stops at 32767.  So
; struct buf carries b_paddr, and both fillers must put the right value there for a target
; ABOVE that ceiling -- the case the old code got silently wrong rather than loudly.
;
; The map, deliberately all above physical page 32:
;
;      virtual page   0  |  1   2 | 3 .. 27 | 28 29 30 31
;      physical page  39 | 41  42 |   --    | 43 44 45 46
;                    text|  data  |unmapped |    stack
;
; Three legs, and main() returns the number of the check that failed:
;
;   A (10-18)  swap() to physical page 60.  Asks for more than the one-zone clamp so the
;              loop issues two transfers: the second catches a coreaddr or a blkno advanced
;              in the wrong unit.
;   B (20-36)  physio().  A legitimate two-page data transfer (which the OLD code rejected,
;              comparing a page number against u_tsize in words); both sides of the
;              NPAGE * PGSZ ceiling; the text guard; the data/stack gap; a zero count; a fat
;              pointer off a word boundary; a byte count that is not a whole word.
;   C (40-46)  physrange() directly.  Virtual pages 1-2 are physically adjacent (41, 42) but
;              0-1 are not (39, 41) -- the image's u-area page sits between them and is not
;              in the map -- so the contiguity walk is exercised with no hand-built
;              descriptor.
;
; `set mmu cache' for the same reason every other MMU test here uses it: sureg() writes РП
; through drainbrz(), and a kernel that only worked with the cache off would not have worked
; on the real machine.
;
; Bite tests -- each of these reintroductions must turn this test red:
;   * `bp->b_un.b_addr = (caddr_t)coreaddr' in swap()          -> 11 (61440 masks to 28672)
;   * `base = (unsigned)u.u_base' without ptrword()            -> 20 (marker bit and byte
;                                                                    offset land in the page)
;   * the old `eb >= 1024' ceiling instead of physrange()      -> 29 (dead code once base is
;                                                                    masked: nothing rejects)
;   * page numbers compared against u_tsize in words           -> 20 (every data transfer
;                                                                    wrongly refused)
;   * `coreaddr += wtob(tcount)' in swap()                     -> 16 (6x too far)
;   * physrange() without the contiguity walk                  -> 42 (text -> data accepted)

reset
set cpu latin
set mmu cache

load biotest
go
; The clean-exit halt is crt0.s's `halt:', at _start + 2 -- so this constant moves
; whenever the const/text laid down ahead of _start changes size.  `b6nm biotest |
; grep _start' is how to re-derive it.
if (PC != 00624) echof "FAIL: biotest, expected halt at PC 00624, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: biotest, a check failed; main() returned:"; ex ACC; exit 1

echof "PASS: biotest (b_paddr names physical memory, and physio validates in words)"
quit
