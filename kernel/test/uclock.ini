; From-USER-mode TIMER test -- the interval timer, kernel/intr.c:extintr() and kernel/clock.c, on
; the machine.  Task 15e.
;
; uintr proved the 0501 gate; uclock proves what is now behind it.  Like usys, and unlike uintr and
; utrap, it links THE CODE UNDER TEST -- the kernel's own intr.o and clock.o, not copies -- and
; hand-builds only the environment they name (proc[], the u-area's neighbours, and recording stubs
; for wakeup/psignal/setpri).  Only the gate is duplicated, into crt0c.S, for the standing reason
; that besm6.o cannot enter a standalone test.
;
; uclock.c forges a user context with sureg(), arms a one-tick callout with timeout(fn, MAGIC, 1),
; seeds lbolt at HZ-1 so the same tick also rolls the second over, opens the interrupt level with
; the real spl0(), and raises GRP_TIMER with `увв 031' while БлПр is still set.  The tick therefore
; fires at uprog's very first user instruction, deterministically -- no device, no timing.  uprog
; then reads a closed page; the data fault vectors to 0500 -> report(), which checks what the tick
; did and halts with a mask.
;
; The order of that opening sequence is load-bearing: spl0() runs BEFORE intrinit(), so the level
; opens while МГРП is still empty and nothing can be delivered, and a bare __besm6_maskpsw() --
; setipl()'s own instruction, issued behind its back -- closes it again before the sources are
; armed.  Arming first leaves a two-instruction window in kernel mode, and
; this simulator's interval timer is calibrated against the wall clock -- GRP_TIMER is back up
; within a few dozen instructions -- so that window is not a race but a certainty: the tick lands
; inside spl0() itself, charges u_stime, and fires the callout on a kernel frame (ACC = 020).
;
; What one tick must produce: the callout runs exactly once with its argument; USERMODE(tr->spsw)
; is true, so u_utime is charged and u_stime is NOT (that pair is the sharpest check here -- it is
; only right if clock() read the frame the gate published in u.u_ar0, and it fails for a stale or
; guessed frame pointer); the second rolls over (++time, runrun, wakeup(&lbolt), p_time aged,
; SIGCLK raised once, setpri called); МГРП comes back open, because clock() leaves spl1 behind and
; `выпр' restores БлПр but NOT the mask, so extintr() has to; u.u_ar0 is restored; and the physical
; stack-switch sentinel at 070010 is intact -- extintr() + clock() + the proc[] sweep is a lot of C
; to have run on the user's r15 by mistake.
;
; THE INTERVAL TIMER CANNOT BE TURNED OFF.  It free-runs at 250 Hz (CLK_TPS) and re-arms itself,
; and the SIMH CLK device has no DEV_DISABLE, so no `set clk' can stop it: a second tick may land
; during the run.  Every check above tolerates one -- the callout is compacted out of callout[]
; when it fires, lbolt restarts at 0 so the second cannot roll over twice, and p_clktim is already
; 0 -- which is why u_utime is checked with `>=' and everything else with `=='.
;
; No `set mmu cache' (as in uintr, unlike mmutest/utrap/usys): uprog reports nothing through the
; map, so there is no mapped-store/physical-read round trip for the БРЗ hazard to bite.
;
; ACC == 0 means every check held.  A nonzero ACC names the failing one: 1 stack not switched,
; 2 the callout never fired (the tick did not reach clock()), 4 it fired twice or with the wrong
; argument, 010 no user time, 020 SYSTEM time charged -- the wrong frame, 040 the second did not
; roll over, 0100 lbolt did not wrap, 0200 no runrun, 0400 no wakeup on &lbolt, 01000 p_time not
; aged, 02000 SIGCLK not raised exactly once, 04000 setpri not called, 010000 МГРП left masked --
; extintr() did not restore the ipl, 020000 wrong frame published, or u.u_ar0 disturbed not charged.

reset
set cpu latin

load uclock
go
if (PC != 02113) echof "FAIL: uclock, expected halt in halt() at PC 02113, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: uclock, a check failed (1 stack, 2 no callout, 4 callout count/arg, 010 utime, 020 stime, 040 time, 0100 lbolt, 0200 runrun, 0400 wakeup, 01000 p_time, 02000 sigclk, 04000 setpri, 010000 mgrp, 020000 frame); ACC:"; ex ACC; exit 1

echof "PASS: uclock (a timer tick reaches clock() from user mode and a callout fires)"
quit
