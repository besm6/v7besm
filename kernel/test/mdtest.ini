; The disk driver moves data, through its two-step protocol -- kernel/dev/md.c, and the ГРП
; dispatch in kernel/intr.c.  Task 18b.4.
;
; The mirror of mbtest.  Links THE CODE UNDER TEST -- the kernel's own md.o and intr.o -- and
; stubs only what they name (iodone, physio, clock, scintr, mbintr, intrframe, u).  No gate and
; no user mode: mdtest.c blocks delivery with the real spl7() and calls extintr() as an ordinary
; C function in a poll loop, so every completion arrives inside the request that caused it.
;
; WHAT THE DISK ADDS OVER THE DRUM.  A drum exchange is one instruction; a disk exchange is four
; commands.  Their order matters on the real machine -- group select and unit select RAISE the
; controller's wired ГРП free bit and only the exchange control word lowers it, so md.c issues
; both selects BEFORE the control word -- but THIS TEST DOES NOT CHECK THAT, and the claim is
; not made here.  Bite-tested: rewritten control-word-first, everything below still passes,
; because SIMH performs the transfer synchronously inside the track-address command, so a
; completion taken too early still finds the data in place.  See the header of kernel/dev/md.c.
; What this test does check is everything else the four commands have to get right: which drive,
; which group, which controller, which half of the zone and which half of the memory page.
;
; THREE DRIVES ARE ATTACHED, and each is there to prove one thing:
;
;   md00  minor 000  controller 3, group 0 -- the ordinary case, checks 1-4
;   md10  minor 010  controller 3, GROUP 1 -- proves the group-select command went out (5)
;   md40  minor 040  CONTROLLER 4          -- proves 033 4 / 033 024 / GRP_CHAN4_FREE (6)
;
; The minor number IS the simulator's unit subscript, by design: bit 5 the controller, bits 4-3
; the group, bits 2-0 the drive.  So the number in the `attach' line and the number in mdtest.c
; are the same number, which is worth a great deal when a transfer goes to the wrong place.
;
; `attach -n' both creates and FORMATS an image, unlike the drum, whose file starts empty and
; cannot be read before it is written -- so nothing here depends on writing before reading.  The
; filename must carry a volume number in 2048..4095 (the simulator scrapes the rightmost run of
; digits and rejects anything else), hence the names below.  Each image is 8 256 000 bytes; `make
; clean' removes them along with the drums.
;
; The drives are left at their default type, ЕС-5052 (7.25 Mb).  THIS MATTERS: on the 29 Mb
; ЕС-5061 the controller ignores CW_PAGE_MODE and always moves a whole 1024-word zone, so the
; half-zone this driver is built on does not exist there and checks 1, 2 and 4 would transfer
; twice what they asked for.  `set md0 ec-5061' and this test fails by design.
;
;   Run 1 (mode 0), all three drives attached:
;     1. An even block -- zone 0 track 0 of md00 -- plus the four service words at 030-033.  In
;        half-zone mode the controller touches only four of the eight, and WHICH four says which
;        track it used, so this checks the track selection twice over.
;     2. An ODD block -- zone 0 track 1.  The half the drum needs four exchanges for.  The bit
;        that selects it is bit 1 of the track-address command and NOT DISK_HALFZONE in the
;        control word, which the controller does not read; a driver that used the latter fails.
;     3. THE PLACEMENT CHECK, and the one a round trip cannot make.  Zone 0 now holds check 1's
;        pattern in one half and check 2's in the other, from two separate requests; read the
;        zone back WHOLE and require exactly that layout.  This is also the only check that
;        exercises CW_PAGE_MODE, so a driver stuck in either mode fails here -- as does one whose
;        track bit is built at the wrong shift, the halves then being swapped.
;     4. DISK_HALFPAGE: the memory side on a half-page boundary, which is what an odd entry of
;        buffers[] is.  Written from the upper half of the page and read back to the base, so a
;        driver that dropped the bit returns the lower half's pattern instead.
;     5. md10 -- the group-select command.  Drop it and the controller answers from group 0.
;     6. md40 -- the second controller, then a re-read of md00 block 0.  With the controller
;        index stuck at 0 the whole of check 6 would run on md00 and PASS, having destroyed what
;        check 1 wrote; 6b is what notices.  Get GRP_CHAN4_FREE wrong and this HANGS.
;
;   Run 2 (mode 1), md40 detached:
;     7. The same controller-4 request must come back with B_ERROR and the whole request in
;        b_resid.  An unattached unit records itself in the error mask at 033 4035 and returns
;        WITHOUT scheduling a completion -- so without the EXT_IOERR poll in mdstart() this is a
;        hang, not a wrong answer.
;
;   Both runs end with check 8: a completion nobody is waiting for.  GRP_CHAN3_FREE is forged
;   with the driver idle and armed, and extintr() must return, having disarmed it in МГРП -- ГРП
;   cannot be cleared of a wired bit at all.  ugrp used to hold this ground with this very bit;
;   it now has a handler, so ugrp moved to a tape bit and the disk half lives here, where the
;   real md.o is linked.
;
; `step 50000000', not `go': every failure worth having here is a hang -- a completion bit that
; never comes, or one nobody disarmed -- and only a step count can fail those.
;
; No `set mmu cache': nothing here goes through the map, so there is no mapped-store /
; physical-read round trip for the БРЗ hazard to bite.  The transfers land on physical page 020,
; far above this image, page-aligned, and below the 32767 a C pointer can name.
;
; ACC == 0 means every check held.  A nonzero ACC names the failing one: 1 a transfer that should
; have worked reported B_ERROR, 2 the even-block round trip differed, 4 the service words did not
; survive, 010 the odd-block round trip differed, 020 the two halves were not where they were
; written, 040 DISK_HALFPAGE did not move the memory side, 0100 the group-1 drive differed, 0200
; the controller-4 drive differed, 0400 the controller-4 write landed on controller 3, 01000 the
; missing drive did not report B_ERROR, 02000 its b_resid was wrong, 04000 the mode word was not
; deposited, 010000 a request ended without B_DONE, 020000 an idle completion was not disarmed.

reset
set cpu latin

; ---- Run 1: all three drives attached ----

load mdtest
attach -n md00 mdtest2053.disk
attach -n md10 mdtest2054.disk
attach -n md40 mdtest2055.disk
d 0100 0
step 50000000
if (PC != 0571) echof "FAIL: mdtest run 1, expected halt in crt0 (a disk that never completes hangs here), got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: mdtest run 1, a check failed (1 B_ERROR, 2 even block, 4 service words, 010 odd block, 020 placement, 040 DISK_HALFPAGE, 0100 group 1, 0200 controller 4, 0400 controller 4 wrote controller 3, 010000 no B_DONE, 020000 idle completion); ACC:"; ex ACC; exit 1

; ---- Run 2: the controller-4 drive detached, so a request for it must fail rather than hang ----

detach md40
reset
load mdtest
d 0100 1
step 50000000
if (PC != 0571) echof "FAIL: mdtest run 2, expected halt in crt0 -- a hang here means mdstart() armed a completion bit for a drive that is not there, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: mdtest run 2, a check failed (1 B_ERROR, 2 even block, 4 service words, 010 odd block, 020 placement, 040 DISK_HALFPAGE, 0100 group 1, 01000 missing drive not reported, 02000 wrong b_resid, 04000 mode word, 010000 no B_DONE, 020000 idle completion); ACC:"; ex ACC; exit 1

echof "PASS: mdtest (the disk round-trips both halves of a zone, on three drives across two controllers, and a missing one fails instead of hanging)"
quit
