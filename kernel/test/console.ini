; The console as a CONTROLLING TERMINAL -- task 23.
;
; boot.ini next door proves the kernel gets a user program running and that it can write on
; the console.  This one has a conversation with it: it boots the same image, waits for
; /etc/init (kernel/test/coninit.S) to prompt, TYPES AT IT, and checks what comes back.
;
; That is the only way to reach the top half of the terminal code.  sctest drives the same
; Consul, but from a standalone image with no kernel underneath -- it reaches the `ext'
; instructions and stops there.  What runs only here is scintr() -> ttyinput() -> canon(),
; the erase/kill/EOF processing, the ECHO path back out through ttyoutput()/ttstart(), the
; clists that carry all of it (kernel/prim.c), and the /dev/tty indirection in dev/sys.c.
;
; HOW THE DIALOGUE IS DRIVEN.  SIMH `expect' watches the console output and fires an action
; when a string appears; `send' injects keystrokes.  On the input side the console line goes
; through sim_poll_kbd(), which serves injected characters BEFORE it looks at the real
; keyboard -- so this works under ctest with no tty on stdin, which is the whole point.  An
; expect that fires HALTS the simulator, so each action ends with its own `step' to restart
; it; the run is therefore bounded by wall clock (the ctest TIMEOUT) rather than by one step
; budget.  All four rules are armed before the machine starts and any of them can fire; a
; rule is removed once it has matched, which is what keeps the three prompts apart.
;
; NO SWITCHES ON THE expects, and `-c' in particular would be a bug here: SIMH's `-c' is
; CLEARALL -- discard every other rule once this one matches -- not "compare literally", as
; the summary in doc/Simh_Simulator.md used to say.  A bare `expect' already matches the
; quoted byte string exactly; `-r' is what asks for a regular expression.
;
; WHAT EACH LINE TESTS, and why a wrong kernel cannot pass:
;
;   "ab#c"  -> echoed as typed, delivered as "ac".  `#' is CERASE (sys/tty.h): ttyinput()
;              echoes it like any other character -- this is a PRINTING terminal, there is
;              no backspace-erase -- and canon() drops it together with the `b' when it
;              moves the raw queue to the canonical one.  A clist that loses or duplicates
;              characters, or an erase that does not erase, changes what comes back.
;
;   "x@yz"  -> echoed as typed plus a newline, delivered as "yz".  `@' is CKILL, and
;              ttyinput() adds the newline itself (tty.c, the ECHO arm) so the abandoned
;              line does not run into the next one.
;
;   48 chars-> echoed and delivered whole.  This one is about the CLISTS, not the line
;              discipline: CBSIZE is 30 (sys/param.h), so a line this long is the only
;              stage that CHAINS BLOCKS -- putc() taking a second one from cfreelist,
;              getc() handing the first one back, in the raw queue, the canonical queue
;              and the output queue alike.  The three short lines above never leave the
;              first block, and the pointer arithmetic that used to do this bookkeeping
;              could not work on this machine at all (see kernel/prim.c).  Keep a stage
;              longer than CBSIZE here.
;
;   ^D      -> nothing echoed, and read() returns 0.  \004 is CEOT = tun.t_eofc:
;              ttyoutput() drops it rather than echo it, canon() drops it from the line, so
;              a line consisting of just ^D delivers no characters at all -- which is what
;              end of file IS on a v7 terminal.  coninit leaves its loop there.
;
;   "console ok" is then written through /dev/TTY, not through the descriptor init already
;              holds: it only appears if syopen()/sywrite() (dev/sys.c) resolved u.u_ttyd
;              back to this same terminal.  Its arrival is the /dev/tty assertion.
;
; A FAILURE IS A TIMEOUT-SHAPED THING, deliberately: whatever goes wrong -- a dropped
; character, an erase that does not erase, a read that never wakes, a /dev/tty that opens
; onto nothing -- leaves the last expect unfired and the final `step' runs out, which is
; what the FAIL at the bottom reports.  Where it stopped is the diagnosis: look the PC up in
; ../unix.nm (kernel) or coninit.nm (init).
;
; WHAT THIS TEST DOES NOT REACH, so that nobody reads a PASS as covering it: the output
; queue never grows past TTHIWAT, so ttwrite()'s ASLEEP/wakeup arm and ttyblock()'s ^S/^Q
; flow control are untouched; nothing sends CINTR or CQUIT, so the signal arm of ttyinput()
; and flushtty() are untouched; and no second process ever opens the terminal, so the
; process-group half of ttyopen() is only ever taken once.
;
; `set tty25 raw' is load-bearing on BOTH sides.  Out, the bytes go untranslated so expect
; sees the ASCII the kernel emitted.  In, vt_fix() passes CR and DEL through unchanged
; instead of folding CR to ETX -- so the kernel's CRMOD is the only thing turning a typed
; CR into a newline, which is exactly what dev/sc.c's header says it must be.
;
; `attach -r': the image is a build artifact, and NOT `-n', which would create and format an
; empty container that sbcheck() then rejects.
;
; THE DRUMS MUST BE ATTACHED TO EXEC ANYTHING -- they are swapdev, and exece() stages the
; argument list there before it touches the new image; with no drum the exec fails with EIO.
; See boot.ini.in, which says it at length.  They are named for this test because ctest runs
; the SIMH tests in parallel and boot.ini wants a swap area of its own.

reset
set cpu latin
set mmu cache
set tty25 raw

attach tty25 console
attach -r md00 root3072.disk
attach -n drum0 console0.drum
attach -n drum1 console1.drum
load ../unix

expect "line> " send "ab#c\r"; step 50000000
expect "ac\r\nline> " send "x@yz\r"; step 50000000
expect "yz\r\nline> " send "0123456789abcdefghijklmnopqrstuvwxyz0123456789ab\r"; step 50000000
expect "\r\n0123456789abcdefghijklmnopqrstuvwxyz0123456789ab\r\nline> " send "\004"; step 50000000
expect "console ok" echof "PASS: console -- a typed line read from /dev/console and echoed, erase, kill and ^D honoured, a line longer than a clist block carried whole, /dev/tty on the same terminal"; quit

step 50000000

echof "FAIL: the console dialogue never completed -- the last expect never fired. See console.ini for what each stage sends and expects. PC:"
ex PC
exit 1
