; STACK-GROWTH test -- the geometry the new grow() (kernel/sig.c) rests on.  Task 17.
;
; ugrow (source ugrow.c + crt0g.S, linking the kernel's real utab.o/brz.o/seg.o) forges a
; genuine user-mode context with sureg(): text at virtual page 0, data at page 1, and a
; ONE-page user stack at USTKPAGE = 28 (070000-071777).  Virtual page 29 is therefore closed
; -- it is the next stack page, not grown yet -- and page 30 is closed for good.
;
; The forged user stores a sentinel one word past the stack top.  That takes a data-protection
; fault on page 29, which is exactly what the real kernel turns into a stack growth
; (trap.c: T_DATA + USER -> grow(page), the page as the machine reports it).  The handler grows
; the stack and returns; the store re-executes into the page that now exists.  A second touch,
; of page 30, means "done".
;
; What is under test is a GEOMETRY claim.  The stack grows UP from 070000 and sureg() lays its
; physical pages out as the tail of the image, so a new page is appended at the next higher
; virtual address AND at the end of the image at once -- and the pages already in the stack keep
; the addresses they had.  That is why grow() has no copyseg shuffle at all.
; So the test seeds the one stack page that exists, grows the stack out from
; under it, and checks it did not move: same physical page, same contents, same translation.
; An implementation that shuffled the stack would slide that page up by one and fail here.
;
; `set mmu cache' is required: the handler reprograms РП on the growth (sureg), and the user's
; sentinel is a MAPPED store read back PHYSICALLY, so the БРЗ write-back hazard is live -- the
; same round trip mmutest and utrap document.
;
; `step', not `go': a lost gate or a growth that never happens HANGS rather than failing, and
; only a step limit turns that into a failure.
;
; ACC == 0 means every leg held.  A nonzero ACC names the failing check: 1 fault-1 cause/page,
; 2 fault-2 cause/page, 4 framed r15, 010 the retried store missed the grown page, 020 the
; pre-existing stack page lost its sentinel, 040 it changed physical address, 0100 wrong fault
; count, 0200 u_ssize/mapping do not describe the two pages now there.  020 and 040 are the
; ones that mean the no-shuffle claim is wrong.

reset
set cpu latin
set mmu cache

load ugrow
step 50000000
if (PC != 02062) echof "FAIL: ugrow, expected halt in halt() at PC 02062, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: ugrow, a check failed (1 cause1, 2 cause2, 4 r15, 010 grown page, 020 old sentinel, 040 old mapping moved, 0100 fault count, 0200 u_ssize); ACC:"; ex ACC; exit 1

echof "PASS: ugrow (the stack grows by appending a page, and the pages already in it do not move)"
quit
