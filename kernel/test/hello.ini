; Binary a.out loader regression test (+ a TTY "hello world").
;
; Exercises besm6_load()'s automatic detection of a binary a.out image.
; hello is a linked executable (source hello.s) that prints "Hello!"
; to the operator console (Consul #1) and then halts.  It walks the message with
; a vtm/vlm loop, sending each character to the console with `ext 0174`
; (opcode 033) and polling the console-ready status (`ext 04102`) before each
; one.  a_entry = 011, so `go` starts at main; the final стоп halts at address 015.
;
; The console (tty line 25 = Consul #1) is put in RAW mode -- each code is emitted
; as a raw byte -- and bound to the SIMH console, so the ASCII message appears on
; stdout unchanged.
;
; `reset` first, for a clean machine state independent of the preceding tests: it
; re-arms the terminal clock that re-raises the console-ready bit the program
; polls on.  (After a long fast run the calibrated clock's tick spacing grows so
; large that the busy-wait poll would otherwise never see the next tick.)

reset
set tty25 raw
attach tty25 console

load hello
go
if (PC != 015) echof "FAIL: aout, expected PC 015, got:"; ex PC; exit 1

echof "PASS: aout (printed Hello!)"
quit
