; МГРП is dynamic, and a WIRED ГРП bit does not wedge extintr() -- kernel/intr.c.  Task 18b.2.
;
; The mass-storage completion bits are wired: `002 037' clears `GRP &= ACC | GRP_WIRED_BITS'
; and quietly keeps them, and "free" means IDLE, so such a bit stands whenever no transfer is
; running.  extintr()'s fallback arm -- "dismiss the highest pending bit, so that a bit nobody
; handles cannot spin here forever" -- therefore clears nothing for these and spins on exactly
; the case it was written to prevent.
;
; Like uclock, and unlike uintr and utrap, this links THE CODE UNDER TEST -- the kernel's own
; intr.o -- and stubs only what it names (clock, scintr, intrframe).  Unlike uclock it needs no
; gate and no user mode: ugrp.c blocks delivery with the real spl7() and calls extintr() as an
; ordinary C function, so every ГРП bit arrives exactly where the source says it does.  Bits are
; forged with `увв 031' (GRP |= ACC << 24) -- no device to attach, no timing.
;
; Part 1's forged bit has been evicted twice.  It began as GRP_DRUM1_FREE; task 18b.3 gave the
; drum bits a handler, so it moved to GRP_CHAN3_FREE; task 18b.4 gave the disk bits one, so it
; moved to GRP_CHAN5_FREE -- tape channel 5, wired in the same way but belonging to a device this
; kernel does not drive, which is what makes this the last move rather than the next one.
;
; Part 1, the done-condition: GRP_CHAN5_FREE forged and armed, then extintr().  It must RETURN --
; there is no assertion for that, a failure is a HANG, which is what `step' below turns into a
; failure -- and it must have dropped the bit from МГРП, since dropping it from ГРП is not
; possible.  That the bit is still up in ГРП afterwards is checked too: it is what proves the
; wired path was the one exercised.
;
; Part 2, the contrast: an ordinary flip-flop nobody handles (bit 30, имитация) must come OUT of
; ГРП and STAY armed in МГРП.  A guard that disarmed every unhandled source would pass part 1 and
; be silently wrong -- deafening the kernel to any device that ever glitches.
;
; `step 50000000', not `go': a spin in extintr() is a hang, and only a step count can fail it.
;
; No `set mmu cache' (as in uintr and uclock): nothing here goes through the map, so there is no
; mapped-store/physical-read round trip for the БРЗ hazard to bite.
;
; The free-running interval timer cannot be switched off, but it costs nothing here: GRP_TIMER is
; armed by intrinit() and extintr() handles it in its own arm long before the fallback.
;
; ACC == 0 means every check held.  A nonzero ACC names the failing one: 1 intrinit() armed the
; wrong set, 2 mgrpon() added the wrong bit, 4 the wired bit is still armed (extintr() would spin),
; 010 the boot sources were disarmed too, 020 the wired bit came out of ГРП so part 1 tested
; nothing, 040 the flip-flop was not dismissed from ГРП, 0100 the flip-flop was disarmed from МГРП,
; 0200 mgrpoff() removed the wrong bit.

reset
set cpu latin

load ugrp
step 50000000
if (PC != 0534) echof "FAIL: ugrp, expected halt in crt0 at PC 0534 (a spin in extintr() hangs here), got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: ugrp, a check failed (1 intrinit, 2 mgrpon, 4 wired bit still armed, 010 boot sources lost, 020 wired bit cleared from ГРП, 040 flip-flop not dismissed, 0100 flip-flop disarmed, 0200 mgrpoff); ACC:"; ex ACC; exit 1

echof "PASS: ugrp (МГРП arms and disarms; a wired ГРП bit passes through extintr() without spinning)"
quit
