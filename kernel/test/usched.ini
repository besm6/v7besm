; usched -- newproc() and swtch() alternate between two processes.  Task 16's "done when".
;
; The sixth standalone test, and the one that links the REAL scheduler: kernel/slp.o drives
; the switch, rather than the test calling save()/resume() itself the way uswtch does.
; newproc() forks proc[1] out of proc[0]'s image and the two hand the machine back and forth
; through v7's own dance -- proc[0] resuming through u_qsav and u_rsav, the child arriving in
; newproc()'s own save() through u_ssav.
;
; What it proves beyond uswtch: that the u-area invariant survives the code that exercises it.
; newproc() has to uflush() before copying the parent's image -- otherwise the child inherits
; a stale u_ssav and never returns from its save() -- and each process has to see its own
; u-area, which is checked with a sentinel written into `u' itself and read back after the
; round trip.
;
; `set mmu cache' is REQUIRED, as for mmutest and uswtch: every switch copies the u-area
; through a stolen window, so it is a mapped-store/physical-read round trip, and the drains
; that make it correct are invisible with the cache off.
;
; There is no disk on this machine yet (task 18), so swap() and xswap() are stubs that must
; never run; the coremap is seeded large enough that malloc() always succeeds and newproc()
; takes its copyseg() branch.  Bit 040 fires if a stub ran, so the test cannot pass by
; quietly proving less than it claims.
;
; `step' rather than `go': a broken alternation loops rather than failing, and the step limit
; is what turns that into a failure instead of a hung build.

reset
set cpu latin
set mmu cache

load usched
step 50000000
if (PC != 00612) echof "FAIL: usched, expected halt in halt() at PC 00612, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: usched (1 no child, 2 no parent, 4 child sentinel, 010 parent sentinel, 020 uhome, 040 stub ran, 0100 u_procp, 0200 newproc); ACC:"; ex ACC; exit 1

echof "PASS: usched (newproc + swtch alternate, and each process sees its own u-area)"
quit
