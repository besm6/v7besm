; SIGNAL DELIVERY test -- the signal frame (kernel/sendsig.c) on the machine.  lib/README.md
; phase 6, and kernel/TODO.md's "sendsig() pushes one word and no more".
;
; usig (source usig.c + crt0sg.S) forges a genuine user-mode context with sureg() and has a
; signal delivered to it twice, once through each door.  Like usys it LINKS THE CODE UNDER TEST
; -- kernel/sendsig.o, holding the real sendsig() and the real sigret(), which sits at row 45 of
; the test's own sysent[] exactly as it does in the kernel's.  Only the gates are duplicated into
; crt0sg.S, for the standing reason that besm6.o cannot enter a standalone test.
;
; The legs:
;   1. AT A SYSCALL RETURN.  `$77 20' runs a getpid-shaped stub that sets both results and arms
;      the delivery; syscall() writes them into the frame and sysret()'s psig() calls sendsig().
;      The handler checks its entry ABI -- the signal number in the accumulator, r14 = -1, r13
;      naming the planted word one above the 21-word frame -- then clobbers the accumulator, r9,
;      r11, r12 and r14 and returns.  All five must be back, along with r13 and r15.
;   2. AT A FAULT RETURN, FROM A RIGHT-HALF INSTRUCTION.  This is the leg that decides the design:
;      which half of a word to resume at lives in SPSW and only `выпр' reloads it, so a handler
;      could not have returned in user mode.  uprog faults from the RIGHT half of a word whose
;      LEFT half bumps a counter; sigret() must put it back on the right half, so the counter --
;      read out of the second fault's frame -- is 1 and not 2.
;
; And underneath both: THE PLANTED WORD IS EXECUTED.  sendsig() copies a `$77 SYS_sigret' word
; onto the user stack as the handler's return address.  That word is stored by an ordinary
; instruction into a data page, and the machine tags stored words with a свертка that instruction
; fetch checks (besm6_mmu.c: the tag is `RUU ^ PARITY_INSN', and this kernel never sets ПКП/ПКЛ).
; Nothing but running it on the machine proves the tag is right; if it were not, the handler's
; `13 uj' would raise an instruction check instead of reaching the kernel.
;
; `set mmu cache' is required: the frame and the reports are MAPPED stores that report() reads
; back physically, so the БРЗ write-back hazard is live (as in mmutest, utrap and usys).
;
; ACC == 0 means every check passed.  A nonzero ACC names the failing check: 1 wrong dispatch,
; 2 signal number, 4 r14 at entry, 010 r13 at entry, 020 r15 at entry, 040 accumulator not
; restored, 0100 r12, 0200 r14, 0400 r13 clobbered, 01000 r15 not popped, 02000 r9, 04000 r11,
; 010000 wrong fault count, 020000 not a right-half fault, 040000 resumed at the wrong half,
; 0100000 resumed at the wrong instruction, 0200000 the fault leg's handler never ran,
; 0400000 a fault claimed to be from supervisor, 01000000 sendsig() could not build the frame.

reset
set cpu latin
set mmu cache

load usig
go
if (PC != 02111) echof "FAIL: usig, expected halt in halt() at PC 02111, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: usig, a check failed (2 signo, 4 r14, 010 r13, 020 r15, 040 acc, 0100 r12, 0200 errno, 0400 r13, 01000 r15, 02000 r9, 04000 r11, 010000 nfault, 020000 half, 040000 retry, 0100000 resume, 0200000 signo2, 0400000 ktrap, 01000000 exit); ACC:"; ex ACC; exit 1

echof "PASS: usig (the signal frame delivers, the planted word runs, and sigret restores)"
quit
