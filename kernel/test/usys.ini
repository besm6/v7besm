; From-USER-mode SYSCALL test -- the extracode door (kernel/besm6.S: sysgate at 0577 and badext
; at 0550) and the real dispatcher behind it (kernel/syscall.c), on the machine.  Task 15d.
;
; usys (source usys.c + crt0s.S) forges a genuine user-mode context with sureg() and runs four
; legs through the extracode gate.  Unlike uintr and utrap, it links THE CODE UNDER TEST: the
; kernel's own syscall.o, not a copy of it -- which is why the dispatcher lives in its own file.
; Only the gates are duplicated into crt0s.S, for the standing reason that besm6.o cannot enter a
; standalone test.
;
; The legs:
;   1. `$77 20' -- a call with NO arguments.  The two-value return must arrive intact: r_val1 in
;      the accumulator, r_val2 in r12, 0 in r14 -- and r13 (the caller's return address) and r15
;      must be untouched.  r13 is exactly why the second result went to r12.
;   2. `$77 3' -- a call with THREE arguments, staged the real way: arguments 1 and 2 descending
;      below r15, the third in the accumulator.  syscall() must INVERT that into the ascending
;      u_arg[0..2] the callee reads, and must pop the two pushed words on the way out.
;   3. `$77 100' -- a number outside sysent[].  It must be RANGE-CHECKED, not masked: the old
;      `& 077' would have folded it onto syscall 36 and run it.  -1 and EINVAL, from nosys().
;   4. `$50' -- an extracode we do not implement.  badext must signal SIGINS and let the program
;      run on, not halt the machine.
;
; Every leg also checks the INTERRUPT LEVEL.  The hardware forces БлПр on at the vector; the gate
; must clear it again before it dispatches, or a system call would run to completion with the clock
; stopped and every device completion held off.  Each handler reads ПСВ back with getpsw() (psw.s)
; and the report fails if the bit was still set.
;
; uprog then reads a closed page; the data fault vectors to 0500 -> report(), which checks the
; words uprog stored and halts with a mask.  A data fault is the way back because `стоп' from user
; is re-dispatched as extracode э63 -- it would land in badext instead.
;
; `set mmu cache' is required: uprog's reports are MAPPED stores that report() reads back
; physically, so the БРЗ write-back hazard is live (as in mmutest and utrap, unlike uintr).
;
; ACC == 0 means every leg held.  A nonzero ACC names the failing check: 1 stack not switched,
; 2 wrong syscalls dispatched, 4 r_val1, 010 r_val2 (r12), 020 errno on success, 040 r13
; clobbered, 0100 r15 moved with nothing pushed, 0200 argument order/values, 0400 r15 not popped,
; 01000 the 3-argument call errored, 02000 out-of-range number not range-checked, 04000 not
; EINVAL, 010000 badext did not signal SIGINS once, 020000 badext disturbed the accumulator,
; 040000 badext moved r15, 0100000 a handler was dispatched with БлПр still set.

reset
set cpu latin
set mmu cache

load usys
go
if (PC != 02100) echof "FAIL: usys, expected halt in halt() at PC 02100, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: usys, a check failed (1 stack, 2 dispatch, 4 val1, 010 val2, 020 errno, 040 r13, 0100 r15, 0200 args, 0400 pop, 01000 err2, 02000 range, 04000 einval, 010000 badext, 020000 acc4, 040000 r15c, 0100000 ipl); ACC:"; ex ACC; exit 1

echof "PASS: usys (the 0577/0550 gates frame the machine and syscall() marshals the v7 ABI)"
quit
