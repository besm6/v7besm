; uswtch -- save(), resume(), idle() and the u-area invariant, on the real machine.
;
; The fifth forge-free standalone test, and the third (after usys and uclock) to link the
; code under test rather than a copy: the kernel's own switch.o, uarea.o, brz.o, intr.o and
; psw.o.  crt0w.s puts `u' at the real 076000 -- uarea.s windows the live u-area as physical
; page 31, so anywhere else would copy the wrong page -- and runs main() on the u-page stack,
; because resume() reloads that page out from under its own caller.
;
; Three legs, see uswtch.c:
;   A  the nine label slots survive a save()/resume() through the fast path (paddr == uhome);
;   B  the invariant: a sentinel in the live u-area is absent in the other process and comes
;      back when the first is resumed;
;   C  idle() returns -- the interval timer free-runs, extintr() clears `idling' -- and puts
;      the level back.  This is the first interrupt this tree has ever taken in KERNEL mode:
;      until БлПр became the ipl, the gates held it and nothing could be.
;
; `set mmu cache' is REQUIRED, as for mmutest.  uflush/uload copy through a stolen window,
; so every switch is a mapped-store/physical-read round trip, which is exactly the БРЗ
; hazard their drains exist to cover -- and which is invisible with the cache off.  A
; resume() that skipped a drain passes without this line.
;
; A hang rather than a failure is the expected shape of a broken leg C: if the spin is never
; released the machine simply spins.  The step limit turns that into a failure.

reset
set cpu latin
set mmu cache

load uswtch
step 50000000
if (PC != 00554) echof "FAIL: uswtch, expected halt in halt() at PC 00554, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: uswtch (1 save0, 2 regs, 4 r15, 010 phase, 020 sentinel B, 040 sentinel A, 0100 uhome, 0200 idle, 0400 ipl, 01000 no tick); ACC:"; ex ACC; exit 1

echof "PASS: uswtch (save/resume carry the registers, the u-area switches, and idle() wakes)"
quit
