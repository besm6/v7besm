; From-USER-mode external-interrupt test -- the corrected kernel/besm6.S:intrgate, on the machine.
;
; uintr (source uintr.c + crt0u.s, linking the kernel's real utab.o/brz.o and mmuhelp.o) forges
; a genuine user-mode context with sureg(), arms and kicks the Consul "printing finished"
; interrupt, and takes it in user code.  The corrected intrgate must save the full async machine
; (A, r8-r14, R, Y (РМР), the C register M[16] (M[020]) and r15) and switch to the kernel stack -- BECAUSE
; the interrupt came from user mode -- run extintr(), then restore and `выпр' back into the user.
;
; The forged user program reads R, Y, the modifier-armed word and r15 back into r8-r11 and
; traps out via `стоп' (re-dispatched as extracode э63); report() compares them, and the
; physical stack-switch sentinel, against the forged values and halts.  ACC == 0 means all four
; legs held: R, Y, M[16] and the stack switch.  A nonzero ACC names the failing check
; (1 M[16], 2 R, 4 Y, 010 r15 value, 020 stack not switched).
;
; The interrupt is raised in software (увв 031 simulates GRP_TIMER), so there is no device to
; attach.  intrgate programs no page registers, so the БРЗ write cache is not in play here (unlike
; the sureg/uflush round-trips of mmutest); the default (no `set mmu cache') keeps the run simple.

reset
set cpu latin

load uintr
go
if (PC != 02113) echof "FAIL: uintr, expected halt in report() at PC 02113, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: uintr, a check failed (1 M[16], 2 R, 4 Y, 010 r15, 020 stack); ACC:"; ex ACC; exit 1

echof "PASS: uintr (intrgate preserves R/Y/M[16] and switches the stack, from user mode)"
quit
