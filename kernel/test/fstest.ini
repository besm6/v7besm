; The kernel reads a filesystem image the build produced -- kernel/dev/bio.c, kernel/dev/md.c
; and sbcheck() in kernel/alloc.c.  Task 19.
;
; The first closing of the loop between cmd/fsutil and the kernel: test/CMakeLists.txt runs
; b6fsutil over test/root.manifest, converts the result into the SIMH container with `-S', and
; this run reads its superblock back through the real buffer cache and the real disk driver.
; sbcheck() had been compiled and never executed until this test; it now runs twice, once on a
; superblock and once on a block that is not one.
;
; It sits strictly BELOW the boot path: everything iinit() does to mount a root, minus iinit().
; When the boot hang of task 20 is chased, the driver, the cache and the superblock check are
; known good from here.
;
; `attach -r', and emphatically NOT `-n':
;   -r  because the image is a BUILD ARTIFACT.  Nothing in fstest.c writes to the disk, but a
;       driver bug that did would corrupt the very file the next run reads, and the failure
;       would arrive one run later wearing the wrong face.  Read-only removes the possibility.
;   no -n because `attach -n' CREATES AND FORMATS: it would replace the populated image with an
;       empty container, and every check below would fail on a superblock full of zeros.  That
;       is the trap kernel/TODO.md warns task 20 about, and it is worth stating twice.
;
; The image is root2048.disk in the build directory, beside this test's own binary -- the
; simulator scrapes the volume number from the rightmost run of digits in the name (2048..4095),
; which is also how b6fsutil's `-S' chose it.  mdtest's four images are 2053-2056.
;
; No `set mmu cache': nothing here goes through the map.  The buffer cache is at physical page
; 021 -- a fixed address, as it is in the kernel, because mdstrategy() refuses a transfer whose
; memory side is not half-zone grained.
;
; `step 50000000', not `go': the failures worth having here are hangs.  A completion that never
; arrives leaves iowait() polling forever, and panic() (fstest.c) spins by construction; only a
; step count fails either of those.
;
; PC == 0625 is `halt' in crt0.s, the one place a finished run stops.  IT IS A LINKED ADDRESS,
; not a property of the test: b6ld lays the const pool ahead of the text, so a change in bio.c,
; md.c or alloc.c that adds or drops a literal moves every text address by a word.  When that
; happens, read `halt' out of fstest.nm and update the line below rather than hunting for a bug.
; PC == 0627 is `fault': an internal interrupt, i.e. the program addressed something it should
; not have.
;
; ACC == 0 means every check held.  A nonzero ACC names the failing one: 1 a bread() that should
; have worked reported B_ERROR, 2 sbcheck() rejected the image's superblock, 4 the geometry is
; not this kernel's, 010 s_time is not the stamp the build wrote, 020 the free counts are empty
; or out of range, 040 prdev() complained about a good superblock, 0100 a released block did not
; come back from the cache, 0200 sbcheck() accepted a block that is not a superblock, 0400 it did
; not report the one it rejected, 01000 the root inode is not a directory, 02000 panic() ran.

reset
set cpu latin

load fstest
attach -r md00 root2048.disk
step 50000000

if (PC != 0625) echof "FAIL: fstest, expected halt in crt0 -- a hang here means a completion never arrived, or panic() ran (examine word 0101 for 0654321), got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: fstest, a check failed (1 bread B_ERROR, 2 sbcheck rejected the superblock, 4 geometry, 010 s_time, 020 free counts, 040 prdev on a good superblock, 0100 cache, 0200 sbcheck accepted a non-superblock, 0400 it did not report the rejection, 01000 root inode, 02000 panic); ACC:"; ex ACC; exit 1

echof "PASS: fstest (the kernel's own bread() and sbcheck() read and validate the superblock, the root inode and the buffer cache of the image this build produced)"
quit
