; From-USER-mode FAULT test -- the trap gate (kernel/besm6.S:trapgate) and the restart
; protocol, on the machine.  Task 15c.
;
; utrap (source utrap.c + crt0t.S, linking the kernel's real utab.o/brz.o) forges a genuine
; user-mode context with sureg(), leaving virtual pages 4, 5 and 6 closed to data.  The forged
; user reads each of them in turn, so the machine takes three data-protection faults through
; vector 0500 -- the first from the RIGHT half of its word, the second from the LEFT, which is
; what exercises both arms of the PC fixup.
;
; For each fault the gate must save the whole visible machine into the reg.h frame ON THE KERNEL
; STACK (the user's r15 is an unmapped physical index once the trap forces БлП on) and hand
; trap() a pointer that ALIASES that frame.  trap() checks the frame against the forged R, Y
; (РМР), M[16] and r15, backs the PC up over the faulting instruction, opens the page and
; returns -- and the faulting `xta' must then RE-EXECUTE and read the sentinel behind it.  A
; missing PC fixup skips the instruction instead, and the reported word is wrong.
;
; `set mmu cache' is required: trap() reprograms РП on every fault (sureg), and the user's
; reports are MAPPED stores read back physically, so the БРЗ write-back hazard is live here --
; unlike uintr, which programs no page registers.
;
; ACC == 0 means every leg held.  A nonzero ACC names the failing check: 1 M[16], 2 R, 4 Y,
; 010 r15, 020 stack not switched, 040 not from user mode, 0100 wrong ГРП cause/page,
; 0200 fault 1 skipped instead of retried, 0400 fault 2 skipped, 01000 wrong fault count,
; 02000 the gate dispatched with БлПр still set (the level was never opened for trap()),
; 04000 the gate branched to ktrap(), reading the forged user-mode SPSW as supervisor.

reset
set cpu latin
set mmu cache

load utrap
go
if (PC != 02063) echof "FAIL: utrap, expected halt in halt() at PC 02063, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: utrap, a check failed (1 M[16], 2 R, 4 Y, 010 r15, 020 stack, 040 mode, 0100 cause, 0200/0400 restart, 01000 count, 02000 ipl, 04000 ktrap); ACC:"; ex ACC; exit 1

echof "PASS: utrap (the 0500 gate frames the machine and trap() restarts the faulting instruction)"
quit
