; Console driver regression test -- the BESM-6 half of kernel/dev/sc.c, in C.
;
; sctest (source sctest.c + crt0.s) drives Consul typewriter 1 both ways:
;   - polled, spinning on the ready bit in READY2 (`ext 04102`) before each
;     `ext 0174` -- the path kernel putchar()/printf()/panic() take;
;   - interrupt-driven, taking a ГРП interrupt at 0501 on every "printing
;     finished" ПРП bit and feeding the next character from the handler -- the
;     path the tty layer takes.
; It prints "polled" and then "interrupt", and returns 0 iff it took exactly one
; interrupt per character.  crt0.s leaves that status in the accumulator and halts.
;
; The console (tty line 25 = Consul 1) is put in RAW mode -- each code goes out as
; a raw byte, no character-set translation -- and bound to the SIMH console, so the
; ASCII shows up on stdout unchanged.
;
; `reset` first, as in hello.ini: it re-arms the terminal clock that raises the
; console-ready bit and the "printing finished" interrupt this program waits on.

reset
set tty25 raw
attach tty25 console

load sctest
go
if (PC != 0514) echof "FAIL: sctest, expected halt at PC 0514, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: sctest, wrong interrupt count, status:"; ex ACC; exit 1

echof "PASS: sctest (polled + interrupt-driven console)"
quit
