; MMU regression test -- the kernel's own sureg() (kernel/utab.c), on the real machine.
;
; mmutest (source mmutest.c + crt0.s + mmuhelp.s) links the kernel's real utab.o and
; brz.o, hands sureg() a hand-built process, and lets it program the hardware.  The map:
;
;      virtual page   0   1 |  2   3 | 4 .. 27 | 28 | 29 30 31
;      physical page  20  21|  17  18|  --     | 19 |  --
;                     text  |  data  | unmapped| stk| unmapped
;
; main() returns 0 only if physaddr(), useracc(), and a write made through a VIRTUAL
; address and read back at the PHYSICAL word all agree; crt0.s leaves that status in the
; accumulator and halts.  Below we also assert the twelve registers sureg() actually
; wrote -- which is the only way to see them, since РП and РЗ cannot be read back by any
; program.  SIMH shows РП unpacked, as four 12-bit page numbers per register, most
; significant field first: RP0 = p3 p2 p1 p0.
;
; It then round-trips a u-area (task 10): fill the live page at 076000, uflush() it to a
; page above 0100000 -- which no unmapped access can reach, so uflush() has to window it --
; scribble, uload() it back, and compare.  Word 0 included: a window on virtual page 0 would
; silently drop it, which is why uarea.s windows pages 1 and 2 instead.
;
; Finally it drives copyseg()/clearseg() (kernel/seg.s, task 11): fill the live page, copyseg()
; it low->high and then high->high (a page above 0100000 to another), read it back mapped, then
; clearseg() it and check the page is zero.  Both routines' БРЗ drains are load-bearing under
; the cache, the same way uflush()'s are -- a missing one shows up here and nowhere else.
;
; `set mmu cache' is not decoration.  It turns on true write-back modelling of БРЗ, and both
; of uflush()'s drains are load-bearing under it and invisible without it.  Delete the one
; BEFORE the copy and main() returns 17 (a user's mapped stores are written back through the
; stolen map); delete the one AFTER it and main() returns 15 (the copy never reaches memory).
; Each passes with the cache off.  That is the hazard a context switch faces, and it is the
; whole reason this test exists.

reset
set mmu cache

load mmutest
go
if (PC != 00604) echof "FAIL: mmutest, expected halt at PC 00604, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: mmutest, a check failed; main() returned:"; ex ACC; exit 1

; РП0: virtual pages 0-3 -> physical 20, 21, 17, 18 (octal 24, 25, 21, 22)
if (RP0 != 022002100250024) echof "FAIL: RP0"; ex reg RP0; exit 1

; virtual pages 4-27 are not mapped: a zero descriptor is what makes a page
; non-executable, and it is the only thing that does
if (RP1 != 0) echof "FAIL: RP1"; ex reg RP1; exit 1
if (RP2 != 0) echof "FAIL: RP2"; ex reg RP2; exit 1
if (RP3 != 0) echof "FAIL: RP3"; ex reg RP3; exit 1
if (RP4 != 0) echof "FAIL: RP4"; ex reg RP4; exit 1
if (RP5 != 0) echof "FAIL: RP5"; ex reg RP5; exit 1
if (RP6 != 0) echof "FAIL: RP6"; ex reg RP6; exit 1

; РП7: virtual page 28 (the stack base, 070000) -> physical 19 (octal 23)
if (RP7 != 023) echof "FAIL: RP7"; ex reg RP7; exit 1

; РЗ: one bit per virtual page, set = closed to data.  Pages 0-3 (text and data) and
; 28 (stack) are open; every other page is closed.
if (RZ != 035777777760) echof "FAIL: RZ"; ex reg RZ; exit 1

echof "PASS: mmutest (sureg built the map, and the mapping is real)"
quit
