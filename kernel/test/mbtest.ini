; The drum driver moves data -- kernel/dev/mb.c, and the ГРП dispatch in kernel/intr.c.
; Task 18b.3.
;
; Like ugrp, and unlike uintr and uclock, this links THE CODE UNDER TEST -- the kernel's own
; mb.o and intr.o -- and stubs only what they name (iodone, physio, clock, scintr, intrframe,
; u).  No gate and no user mode: mbtest.c blocks delivery with the real spl7() and calls
; extintr() as an ordinary C function in a poll loop, so every completion arrives inside the
; request that caused it rather than between two checks.
;
; TWO RUNS, because the machine has exactly two drums and the missing-drum check needs one of
; them absent.  The mode word deposited at 0100 tells the program which run it is; 0100 sits
; in the hole the const segment leaves between the service-word buffers (010-067) and the
; interrupt vectors at 0500, so nothing in the image is there to overwrite.
;
;   Run 1 (mode 0), both drums attached:
;     1. Page mode.  Block 0 -- zone-aligned, page-aligned, a whole zone -- so one CW_PAGE_MODE
;        exchange each way.  The 8 service words are seeded before the write and clobbered
;        before the read, so getting them back proves the fixed buffer at 010-017 is real.
;     2. Sector mode.  Block 1 -- an ODD block, four 256-word exchanges chained through
;        mbintr(), spanning zones 0 and 1 and all four quarters of the memory page.  A
;        DRUM_PARAGRAF or DRUM_SECTOR built at the wrong shift fails here.  Then zone 0 is
;        read back WHOLE: it must be half check 1's pattern and half check 2's, which is what
;        says the data landed where the block number claims and not merely somewhere
;        self-consistent.  A driver that took page mode unconditionally passes without it.
;     3. Drum 2.  Block 512.  Proves EXT_DRUM1 + ctlr and GRP_DRUM1_FREE >> ctlr; get the
;        second wrong and this HANGS rather than fails.  Zone 0 of drum 1 is then re-read to
;        prove the traffic went to the other drum: with ctlr stuck at 0, block 512's zone
;        field wraps in eight bits back to zone 0 and the round trip would pass while
;        destroying what checks 1 and 2 wrote.
;
;   Run 2 (mode 1), drum 2 detached:
;     4. The same drum-2 request must come back with B_ERROR and the whole request in
;        b_resid.  An unattached unit transfers nothing and NEVER INTERRUPTS -- it says so
;        only in the error mask at 033 4035 -- so without the EXT_IOERR poll in mbstart()
;        this is a hang, not a wrong answer.
;
;   Both runs end with check 5: a completion nobody is waiting for.  GRP_DRUM1_FREE is forged
;   with the drum idle and armed, and extintr() must return, having disarmed it in МГРП --
;   ГРП cannot be cleared of a wired bit at all.  ugrp used to hold this ground with the same
;   forged bit; the bit now has a handler, so ugrp moved to GRP_CHAN3_FREE and the drum half
;   of that test lives here, where the real mb.o is linked.
;
; The drum images are created empty with `attach -n'.  Check 1 comes first for that reason:
; SIMH backs a drum with an ordinary file and reading a zone the file does not reach yet
; fails the same way an unattached drum does, so zone 0 has to be written before it is read.
;
; `step 50000000', not `go': every failure worth having here is a hang -- a completion bit
; that never comes, or one nobody disarmed -- and only a step count can fail those.
;
; No `set mmu cache': nothing here goes through the map, so there is no mapped-store /
; physical-read round trip for the БРЗ hazard to bite.  The transfers land on physical page
; 040, far above this image and page-aligned as the driver requires.
;
; ACC == 0 means every check held.  A nonzero ACC names the failing one: 1 a transfer that
; should have worked reported B_ERROR, 2 the page-mode round trip differed, 4 the service
; words did not survive, 010 the sector-mode round trip differed, 020 the drum-2 round trip
; differed, 040 the missing drum did not report B_ERROR, 0100 its b_resid was wrong, 0200 the
; mode word was not deposited, 0400 a request ended without B_DONE, 01000 an idle completion
; was not disarmed, 02000 the data landed in the wrong zone or sector, 04000 the drum-2
; write landed on drum 1.

reset
set cpu latin

; ---- Run 1: both drums attached ----

load mbtest
attach -n drum0 mbtest0.drum
attach -n drum1 mbtest1.drum
d 0100 0
step 50000000
if (PC != 0560) echof "FAIL: mbtest run 1, expected halt in crt0 at PC 0560 (a drum that never completes hangs here), got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: mbtest run 1, a check failed (1 B_ERROR, 2 page mode, 4 service words, 010 sector mode, 020 drum 2, 0400 no B_DONE, 01000 idle completion, 02000 wrong zone/sector, 04000 drum 2 wrote drum 1); ACC:"; ex ACC; exit 1

; ---- Run 2: drum 2 detached, so a request for it must fail rather than hang ----

detach drum1
reset
load mbtest
d 0100 1
step 50000000
if (PC != 0560) echof "FAIL: mbtest run 2, expected halt in crt0 at PC 0560 -- a hang here means mbstart() armed a completion bit for a drum that is not there, got:"; ex PC; exit 1
if (ACC != 0) echof "FAIL: mbtest run 2, a check failed (1 B_ERROR, 2 page mode, 4 service words, 010 sector mode, 040 missing drum not reported, 0100 wrong b_resid, 0200 mode word, 0400 no B_DONE, 01000 idle completion, 02000 wrong zone/sector); ACC:"; ex ACC; exit 1

echof "PASS: mbtest (the drum round-trips a page in both modes, on both drums, and a missing one fails instead of hanging)"
quit
