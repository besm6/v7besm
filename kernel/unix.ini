; Run the Unix kernel on the SIMH BESM-6 simulator (`make run').
;
; Boots the freshly-linked `unix' image: besm6.S:_start seeds the kernel stack
; pointer and calls main(), which clears bss, publishes the memory size, and runs
; the C kernel far enough to print `mem = ...' from startup() on the operator
; console (Consul 1 = terminal line 25).
;
; The console is bound to the SIMH console in raw mode, so the kernel's output
; appears on stdout unchanged.  `reset' first re-arms the terminal clock that the
; polled console putchar() waits on (see kernel/test/hello.ini for why).
;
; No `set mmu cache': task-14 boot runs entirely unmapped and programs no page
; registers, so there is no БРЗ write-back hazard to model here.  (The MMU tests
; in kernel/test/ do need `set mmu cache'.)

reset
set tty25 raw
attach tty25 console
load unix
go
