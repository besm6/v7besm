; Run the Unix kernel on the SIMH BESM-6 simulator (`make run').
;
; Boots the freshly-linked `unix' image the way test/boot.ini does, but for a human:
; besm6.S:_start seeds the kernel stack pointer and calls main(), which sizes memory,
; mounts the root, hands process 1 the icode and returns -- and _start's second half
; turns that return into the first entry into user mode.  The console shows startup()'s
; three lines and iinit()'s root size; after that the machine is in user mode, where
; today the icode's exec of the missing /etc/init fails and it spins (task 24 puts a
; userland on the image).  ^E gets you the simulator prompt: `ex PC' should show the
; icode's `spin' (see unix.nm), `ex ACC' -1 and `ex M16' -- SIMH numbers index registers
; in octal, so that is r14 -- ENOENT.
;
; (bss need not be cleared here: SIMH starts every word at zero -- see the ON_SIMH guard
; in kernel/machdep.c.)
;
; THE ROOT DISK IS ATTACHED, and must be: with no md00 the boot panics in iinit().  It is
; the image kernel/test builds (`make tests' or `make test'), which is why the path points
; into the test build directory; `-r' because it is a build artifact, and NOT `-n', which
; would create and format an empty container that sbcheck() then rejects.
;
; `set mmu cache' models the БРЗ write-back properly, and the boot now needs it modelled:
; it programs РП (estabur -> sureg) and writes user memory through the map (copyout).  A
; kernel that only worked with the cache off would not have worked on the real machine.
;
; The console is bound to the SIMH console in raw mode, so the kernel's output appears on
; stdout unchanged.  `reset' first re-arms the terminal clock that the polled console
; putchar() waits on (see kernel/test/hello.ini for why).

reset
set cpu latin
set mmu cache
set tty25 raw

; Uncomment to trace every instruction into unix.trace (`set cpu debug' emits the
; detailed per-instruction trace; `set debug' routes it to a file).
;set debug "unix.trace"
;set cpu debug

attach tty25 console
attach -r md00 test/root2048.disk
load unix
go
quit
